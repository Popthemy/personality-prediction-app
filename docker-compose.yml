version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: personality_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py createsuperuser --noinput --username admin --email admin@example.com || true &&
             gunicorn backend.config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: backend.config.settings.prod
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personality_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: django-insecure-local-dev-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,web
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build: .
    command: celery -A backend.config worker -l info
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: backend.config.settings.prod
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personality_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: django-insecure-local-dev-key-change-in-production
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
  static_volume:
